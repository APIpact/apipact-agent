name: Release

# Cut a release by pushing a semver tag:
#   git tag v1.2.3 && git push origin v1.2.3          -> channel "stable"
#   git tag v1.3.0-beta.1 && git push origin ...      -> channel "beta"  (prerelease)
#
# Produces: cross-compiled binaries + SHA256SUMS (GitHub Release), signed
# self-update manifests (GitHub Pages, per channel), and a multi-arch container
# image (GHCR). See docs/RELEASING.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v1.2.3"
        required: true

permissions:
  contents: write   # create releases, push gh-pages
  packages: write   # push container image to GHCR
  pages: write
  id-token: write

env:
  MODULE: github.com/APIpact/apipact-agent
  CMDS: supervisor worker agentctl

jobs:
  meta:
    name: Resolve version & channel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      channel: ${{ steps.v.outputs.channel }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - id: v
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "channel=beta"   >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X ${MODULE}/internal/version.Version=${VERSION} \
            -X ${MODULE}/internal/version.Commit=${GITHUB_SHA::7} \
            -X ${MODULE}/internal/version.Date=${DATE}"
          for cmd in $CMDS; do
            out="dist/apipact-${cmd}-${GOOS}-${GOARCH}${EXT}"
            echo "building $out"
            go build -trimpath -ldflags "$LDFLAGS" -o "$out" ./cmd/${cmd}
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Sign manifests & publish release
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - name: Checksums
        working-directory: dist
        run: sha256sum apipact-* | tee SHA256SUMS

      - name: Sign self-update manifests
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          CHANNEL: ${{ needs.meta.outputs.channel }}
          RELEASE_SIGN_PRIVATE_B64: ${{ secrets.RELEASE_SIGN_PRIVATE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_SIGN_PRIVATE_B64:-}" ]; then
            echo "::error::RELEASE_SIGN_PRIVATE_B64 secret is not set; cannot sign update manifests." >&2
            echo "Generate one with 'agentctl release-keygen' and add it as a repo secret." >&2
            exit 1
          fi
          mkdir -p "pages/${CHANNEL}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          # Only platforms that self-update via the binary path get a manifest.
          for plat in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            os="${plat%-*}"; arch="${plat#*-}"
            worker="dist/apipact-worker-${plat}"
            go run ./cmd/release-sign \
              --worker "$worker" \
              --url "${base}/apipact-worker-${plat}" \
              --version "$VERSION" --channel "$CHANNEL" --os "$os" --arch "$arch" \
              --released-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              > "pages/${CHANNEL}/${plat}.json"
            echo "signed pages/${CHANNEL}/${plat}.json"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/apipact-*
            dist/SHA256SUMS

      - name: Publish update manifests to Pages (per channel, additive)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          keep_files: true   # preserve other channels' manifests
          commit_message: "release ${{ needs.meta.outputs.version }} (${{ needs.meta.outputs.channel }})"

  container:
    name: Build & push container image
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: tags
        run: |
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION="${{ needs.meta.outputs.version }}"
          TAGS="${IMG}:${VERSION},${IMG}:${{ needs.meta.outputs.channel }}"
          if [ "${{ needs.meta.outputs.channel }}" = "stable" ]; then
            TAGS="${TAGS},${IMG}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.meta.outputs.version }}
            COMMIT=${{ github.sha }}
